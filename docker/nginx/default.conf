server {
    listen 80;
    server_name localhost;
    root /var/www/backend/public;
    index index.php;

    # Frontend (React build) — root-based routing
    location / {
        root /var/www/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Symfony — must come after / to take priority
    location /api/ {
        root /var/www/backend/public;
        try_files $uri /index.php$is_args$args;
    }

    # PHP-FPM
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
        fastcgi_read_timeout 60;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
}
