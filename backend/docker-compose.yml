version: '3.8'

services:
  php:
    image: php:8.5-fpm-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "9000:9000"
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-your_secret_here}
      DATABASE_URL: sqlite:///%kernel.project_dir%/var/data.db
    command: php-fpm

  nginx:
    image: nginx:alpine
    working_dir: /app
    volumes:
      - .:/app
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "8000:80"
    depends_on:
      - php

  composer:
    image: composer:latest
    working_dir: /app
    volumes:
      - .:/app
    command: install
