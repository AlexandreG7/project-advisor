name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (PHP 8.4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_sqlite, pdo_pgsql, intl, zip, opcache
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHP syntax check
        run: |
          find src migrations -name "*.php" | xargs -P4 php -l | grep -v "No syntax errors" && echo "All files OK" || true

      - name: Validate Symfony container
        run: php bin/console lint:yaml config --parse-tags
        env:
          APP_ENV: test
          DATABASE_URL: "sqlite:///%kernel.project_dir%/var/test.db"

      - name: Run migrations (SQLite, dry-run)
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction --allow-no-migration
        env:
          APP_ENV: test
          DATABASE_URL: "sqlite:///%kernel.project_dir%/var/test.db"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.up.railway.app/api

      - name: Check build output exists
        run: |
          test -f dist/index.html && echo "dist/index.html OK"
          test -d dist/assets    && echo "dist/assets/ OK"

  # ── Docker build check (Railway Dockerfile) ───────────────────────────────
  docker:
    name: Docker build (Railway)
    runs-on: ubuntu-latest
    # Only run on main to avoid burning minutes on every PR
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Railway image
        run: |
          docker build \
            -f backend/Dockerfile.railway \
            -t project-advisor-backend:ci \
            backend/
