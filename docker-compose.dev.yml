services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/backend   # mount source for live reloading
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      APP_SECRET: dev_secret_key_32_characters_long
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.db"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public
      - ./frontend/dist:/var/www/frontend/dist  # served from dist even in dev
    depends_on:
      - php
    restart: unless-stopped

  # Vite dev server — frontend hot reload on port 5173
  node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: "http://localhost:8080/api"
    restart: unless-stopped
